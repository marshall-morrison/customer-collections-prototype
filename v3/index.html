<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Collections Agent — low-fi tabbed page</title>
<style>
  /* deliberately low-fidelity: grey blocks + text, matching the wireframe */
  :root{
    --ink:#1c1c1a; --helper:#6b6e66; --line:#cfcfca;
    --page:#e9e9e6; --band:#d9d9d6; --panel:#efefec;
    --block:#bdbdba; --block2:#c8c8c5; --tab:#a9a9a4; --tabink:#fff;
    --active:#1c1c1a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--page);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;font-size:14px;}
  .app{display:flex;min-height:100vh;}

  /* sidebar */
  .sidebar{width:180px;flex:0 0 180px;background:var(--band);
    display:flex;align-items:center;justify-content:center;color:var(--helper);font-weight:700;}

  /* main column */
  .main{flex:1;padding:18px 22px 40px;max-width:1180px;}

  /* scenario switcher (prototype control, not part of the design) */
  .switch{display:flex;align-items:center;gap:10px;margin-bottom:14px;
    font-size:12px;color:var(--helper);}
  .switch .lab{text-transform:uppercase;letter-spacing:.6px;font-weight:700;}
  .switch select{font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;min-width:340px;}
  .switch button{border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px;}
  .switch button:hover{background:#f3f3f1;}
  .switch .note{flex:1;font-style:italic;line-height:1.4;}

  /* header band */
  .band{background:var(--band);border-radius:10px;padding:18px 22px;display:flex;gap:20px;}
  .band .left{flex:1;min-width:0;}
  .band .cust{font-size:18px;font-weight:700;margin-bottom:6px;}
  .band .ctx{font-size:13px;color:#34352f;line-height:1.5;}
  .band .ctx .needs{display:block;margin-top:8px;color:#7a3b16;}
  .band .right{flex:0 0 340px;border-left:1px solid var(--line);padding-left:20px;}
  .band .right h4{margin:0 0 8px;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--helper);}
  .inv-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12.5px;border-bottom:1px dashed #c7c7c2;}
  .inv-row:last-child{border-bottom:none;}
  .inv-row .st{color:var(--helper);}
  .inv-row .st.overdue{color:#a23a1e;} .inv-row .st.disputed{color:#9a5b00;}
  .inv-row .st.paid{color:#3a7d44;} .inv-row .st.current{color:var(--helper);}

  /* tab bar */
  .tabs{display:flex;align-items:center;gap:10px;margin:14px 0;}
  .tab{background:var(--tab);color:#2c2c29;border:none;border-radius:7px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;}
  .tab.active{background:var(--active);color:var(--tabink);}
  .tabs .spacer{flex:1;}

  /* content panel */
  .panel{background:var(--panel);border-radius:10px;padding:20px;min-height:520px;}
  .panel-head{display:flex;align-items:center;margin-bottom:16px;}
  .panel-head h3{margin:0;font-size:15px;font-weight:700;}
  .panel-head .sub{margin-left:10px;font-size:12.5px;color:var(--helper);}
  .panel-head .acts{margin-left:auto;display:flex;gap:14px;}
  .linkbtn{background:none;border:none;color:#23507f;font-size:13.5px;cursor:pointer;padding:0;}
  .linkbtn:hover{text-decoration:underline;}
  .linkbtn.warn{color:#a23a1e;}

  /* proposed action cards (Actions tab) */
  .card{background:var(--block);border-radius:8px;padding:16px 18px;margin-bottom:14px;cursor:pointer;}
  .card:hover{background:#b4b4b0;}
  .card .k{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:#46473f;font-weight:700;}
  .card .t{font-size:15px;font-weight:600;margin:5px 0 4px;}
  .card .d{font-size:13.5px;color:#2f302b;line-height:1.45;}
  .card .meta{margin-top:8px;font-size:12px;color:#54554d;display:flex;gap:14px;}
  .card.unavail{opacity:.6;}
  .card .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;background:#d8d8d4;color:#54554d;margin-left:8px;}
  .card .badge.cant{background:#e7d3cc;color:#8a3517;}
  .empty{background:var(--block2);border-radius:8px;padding:34px;text-align:center;color:#4a4b44;font-size:14px;line-height:1.6;}

  /* citations: the events an action is responding to */
  .cites{margin-top:11px;padding-top:10px;border-top:1px dashed #adada8;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .cites .clab{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:#54554d;font-weight:700;}
  .chip{font-size:12px;background:#d6d6d2;border:1px solid #b6b6b1;border-radius:14px;padding:3px 11px;cursor:pointer;color:#33342e;}
  .chip:hover{background:#c6c6c2;}
  .cite-open{background:#cececb;border-left:3px solid #9a9a95;margin-top:9px;padding:10px 13px;font-size:12.5px;white-space:pre-wrap;line-height:1.5;border-radius:0 6px 6px 0;}

  /* link-style switcher */
  .moderow{display:flex;justify-content:flex-end;margin-bottom:14px;}
  .modes{display:inline-flex;border:1px solid #b6b6b1;border-radius:7px;overflow:hidden;}
  .modes button{border:none;background:#e3e3df;font-size:12px;padding:6px 12px;cursor:pointer;border-right:1px solid #c9c9c4;color:#33342e;}
  .modes button:last-child{border-right:none;}
  .modes button.on{background:#1c1c1a;color:#fff;}

  /* numbered "what I'm responding to" strip (footnotes + trace) */
  .evstrip{background:#dcdad5;border-radius:8px;padding:13px 15px;margin-bottom:14px;}
  .evstrip .h{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:#54554d;font-weight:700;margin-bottom:9px;}
  .ev{display:flex;gap:10px;padding:5px 0;font-size:13px;align-items:center;}
  .ev .num,.fn .n{flex:0 0 auto;width:21px;height:21px;border-radius:50%;background:#9a9a95;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
  .ev.hot .num{background:#1c1c1a;} .ev.hot{font-weight:600;}
  .ev.dim{opacity:.3;}
  .evstrip.trace .ev{cursor:pointer;border-radius:6px;padding:5px 6px;margin:0 -6px;}
  .evstrip.trace .ev:hover{background:#cfcdc8;}
  .evstrip .hint{font-size:11.5px;color:#54554d;font-style:italic;margin-top:9px;}

  /* events-below: full expanded event content */
  .evstrip.below .ev-full{background:#cececb;border-radius:7px;padding:13px 15px;margin-top:11px;}
  .ev-full .ev-head{font-size:12px;color:#54554d;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;gap:12px;}
  .ev-full .ev-kind{text-transform:uppercase;letter-spacing:.5px;font-size:10.5px;font-weight:700;}
  .ev-full .ev-subj{font-weight:700;font-size:13.5px;margin-bottom:5px;}
  .ev-full .ev-body{font-size:13px;line-height:1.55;white-space:pre-wrap;color:#2f302b;}

  /* footnote refs under an action */
  .fn{margin-top:10px;padding-top:9px;border-top:1px dashed #adada8;font-size:11.5px;color:#54554d;text-transform:uppercase;letter-spacing:.5px;font-weight:700;display:flex;gap:7px;align-items:center;}
  .fn .n{width:19px;height:19px;font-size:11px;}
  .fn-none{font-weight:600;letter-spacing:0;text-transform:none;font-style:italic;color:#7a7b73;}

  /* trace highlight states on the cards */
  .card.sel{outline:2px solid #1c1c1a;outline-offset:-2px;}
  .card.dim{opacity:.4;}

  /* timeline (Activity + Scheduled tabs) */
  .stream{background:var(--block);border-radius:8px;padding:6px 0;}
  .row{display:flex;gap:14px;padding:10px 18px;border-bottom:1px solid #b2b2ae;}
  .row:last-child{border-bottom:none;}
  .row .when{flex:0 0 118px;font-size:12px;color:#4f504a;}
  .row .who{flex:0 0 78px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
  .who.agent{color:#3a5a8a;} .who.cust{color:#8a4a1e;} .who.system{color:#5a5a52;} .who.user{color:#3a7d44;} .who.event{color:#6b4a8a;}
  .row .what{flex:1;min-width:0;}
  .row .what .lbl{font-weight:600;}
  .row .what .sub{font-size:12.5px;color:#3a3b35;margin-top:2px;line-height:1.4;}
  .row.email{cursor:pointer;}
  .row.email:hover{background:#b4b4b0;}
  .row .flags{font-size:11px;color:#55564e;margin-top:3px;}
  .body-open{background:#cececb;border-left:3px solid #9a9a95;margin:0 18px 8px;padding:12px 14px;font-size:13px;white-space:pre-wrap;line-height:1.5;border-radius:0 6px 6px 0;}

  /* settings tab */
  .settings{display:flex;gap:20px;}
  .sidemenu{flex:0 0 210px;background:var(--block);border-radius:8px;padding:8px;}
  .sidemenu .opt{padding:9px 12px;border-radius:6px;cursor:pointer;font-size:13.5px;}
  .sidemenu .opt.active{background:#9c9c97;font-weight:700;color:#fff;}
  .sidemenu .opt:hover:not(.active){background:#b0b0ac;}
  .setpanel{flex:1;background:var(--block);border-radius:8px;padding:20px;}
  .setpanel h4{margin:0 0 4px;font-size:15px;}
  .setpanel p{margin:0 0 16px;color:#3a3b35;font-size:13px;line-height:1.5;}
  .toggle{display:flex;align-items:center;justify-content:space-between;background:#c9c9c6;border-radius:7px;padding:12px 14px;margin-bottom:10px;}
  .toggle .tl{font-weight:600;}
  .toggle .ts{font-size:12px;color:#54554d;margin-top:2px;}
  .pill{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:none;cursor:pointer;}
  .pill.on{background:#2c2c29;color:#fff;} .pill.off{background:#dadad6;color:#54554d;}

  /* inline low-fi drawer (compose / instruction) */
  .drawer{background:#cececb;border:1px dashed #9a9a95;border-radius:8px;padding:14px 16px;margin-bottom:14px;}
  .drawer h5{margin:0 0 8px;font-size:13px;}
  .drawer textarea,.drawer input{width:100%;border:1px solid #b0b0ac;border-radius:6px;padding:8px;font-size:13px;font-family:inherit;background:#fff;margin-bottom:8px;}
  .drawer .closex{float:right;cursor:pointer;color:#54554d;border:none;background:none;font-size:13px;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">Sidebar</aside>
  <main class="main">

    <div class="switch">
      <span class="lab">Scenario</span>
      <button id="prev">‹</button>
      <select id="scenario"></select>
      <button id="next">›</button>
      <span class="note" id="scenarioNote"></span>
    </div>

    <section class="band">
      <div class="left">
        <div class="cust" id="custName"></div>
        <div class="ctx" id="ctx"></div>
      </div>
      <div class="right">
        <h4>Outstanding invoices / status</h4>
        <div id="invList"></div>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="actions">Actions</button>
      <button class="tab" data-tab="activity">Activity</button>
      <button class="tab" data-tab="scheduled">Scheduled</button>
      <span class="spacer"></span>
      <button class="tab" data-tab="settings">Global Settings</button>
    </nav>

    <section class="panel" id="panel"></section>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
